<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tepoztlan Mágico - Post</title>
    <link preconnect href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <link href="https://pueblosmagicos.mexicodesconocido.com.mx/wp-content/themes/pueblosmagicos/img/icons/favicon.ico" rel="shortcut icon">
    <style>
        main{
            padding-top: 70px;
        }
        .post-wrapper img{
            width: 100%;
            margin-bottom: 10px;
        }
        .interacciones{
            display: flex;
            padding: 0 30px;
            gap: 30px;
        }
        .interacciones i{
            font-size: x-large;
        }
        .post-header{
            display: flex;
            padding: 0 30px;
            gap: 10px;
        }
        .post-header img{
            height: 50px;
            width: 50px;
            border-radius: 50px;
        }
        .post-header p {
            font-size: larger;
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <div class="post-wrapper">
            <div class="post-header">
                <img src="/Imagenes/Turista1.jpg" alt="">
                <div class="post-author">
                    <p>@Bren_Moon</p>
                    <p class="post-location" style="font-size: small;"><i style="font-size: small;" class="fa fa-map-marker" aria-hidden="true"></i>Antojitos y Micheladas "La Chona"</p>
                </div>
            </div>
            <img src="/Imagenes/Turista3.jpg" alt="">
            <div class="interacciones">
                <i class="fa-regular fa-heart" aria-hidden="true"></i>
                <i class="fa-regular fa-comment" aria-hidden="true"></i>
                <i class="fa-regular fa-share-from-square" aria-hidden="true"></i>
            </div>
            <p style="padding: 0 30px; margin: 15px 0;"><strong>Bren_Moon:</strong> Lorem ipsum dolor sit amet consectetur adipisicing elit. Illo a asperiores nesciunt alias natus minima fugiat beatae eius dolores.</p>
        </div>

    </main>

    <footer></footer>
    
    <script src="/include.js"></script>
</body>
</html>
