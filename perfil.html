<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tepoztlán Mágico - Mi Perfil</title>
    <link preconnect href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <link href="https://pueblosmagicos.mexicodesconocido.com.mx/wp-content/themes/pueblosmagicos/img/icons/favicon.ico" rel="shortcut icon">
    <style>
        .perfil-header{
            display: flex;
            gap: 20px;
            background: var(--accent-gradient);
            color: wheat;
            padding: 20px;
            border-radius: 30px;
        }
        .perfil-header img{
            height: 100px;
            border-radius: 60px;

        }
        .perfil-container{
            margin-top: 50px;
            height: fit-content;
            padding: 30px 20px;
            padding-top: 50px;
        }
        .perfil-header h1{
            font-family: sans-serif;
            font-weight: lighter;
        }
        .perfil-header .datos-wrapper .correo-usuario{
            font-size: small;
        }
        .datos-wrapper{
            display: flex;
            gap: 5px;
            flex-direction: column;
        }
        .perfil-header .datos-wrapper .btn{
            background: wheat;
            padding: 5px 15px;
            border: 1px solid wheat;
            border-radius: 30px;
            color: black;
            font-weight: bolder;
            width: fit-content;
            font-size: smaller;
            margin: 10px 0;
        }

        .perfil-opciones{
            margin-top: 30px;
        }
        
        .perfil-opciones .opcion{
            height: 40px;
            border-bottom: 2px solid black;
            padding: 30px;
            padding-bottom: 50px;
            display: flex;
            justify-content: space-between;
        }
        .perfil-opciones .opcion a{
            font-size: larger;
        }

        .perfil-opciones .opcion a i{
            margin-right: 30px;
        }
        .perfil-opciones .opcion i{
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <header></header>

    <div class="perfil-container">
        <div class="perfil-header">
            <img src="Imagenes/Turista1.jpg" alt="" srcset="">
            <div class="datos-wrapper">
                <h2 class="nombre-usuario">Brenda Montalvo</h2>
                <p class="correo-usuario">bren1997@gmail.com</p>
                <a href="" class="btn">Editar Perfil</a>
            </div>
        </div>
        <div class="perfil-opciones">
            <div class="opcion">
                <a><i class="fa-regular fa-heart"></i> Favoritos</a>
                <i class="fa fa-caret-right" aria-hidden="true"></i>
            </div>
            <style>
                    .gallery-preview{
                        display: flex;
                        gap: 10px;
                        flex-wrap: wrap;
                        margin-top: 24px;
                        justify-content: center;
                    }
                    .gallery-preview img{
                        height: 100px;
                        border-radius: 15%;
                    }
                    .opcion#galeria{
                        height: fit-content;
                        padding-bottom: 30px;
                        display: block;
                    }
                    .opcion#salir{
                        border-bottom: none;
                    }
                </style>
            <div class="opcion" id="galeria">
                <a><i class="fa-regular fa-image"></i> Mi Galería</a>
                <div class="gallery-preview">
                    <img src="Imagenes/Turista1.jpg" alt="">
                    <img src="Imagenes/Turista2.jpg" alt="">
                    <img src="Imagenes/Turista3.jpg" alt="">
                    <img src="Imagenes/Turista4.jpg" alt="">
                    <img src="Imagenes/Turista5.jpg" alt="">
                    <img src="Imagenes/Turista6.jpg" alt="">
                </div>
            </div>
            <div class="opcion">
                <a><i class="fa-regular fa-star"></i> Mis Reseñas</a>
                <i class="fa fa-caret-right" aria-hidden="true"></i>
            </div>
            <div class="opcion">
                <a><i class="fa-regular fa-square-check"></i> Lugares Visitados</a>
                <i class="fa fa-caret-right" aria-hidden="true"></i>
            </div>
            <div class="opcion" id="salir">
                <a><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
                <i class="fa fa-caret-right" aria-hidden="true"></i>
            </div>
        </div>
    </div>

    <footer></footer>

    <script src="include.js"></script>
</body>
</html>
